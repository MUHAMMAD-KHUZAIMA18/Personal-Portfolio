<!DOCTYPE html>
<html>
<head>
<title>Portfolio - Coming Soon</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#1f1c2c,#928dab);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
}

.container{
    padding:40px;
}

h1{
    font-size:50px;
    margin-bottom:10px;
}

p{
    font-size:20px;
    opacity:0.9;
}

#countdown{
    font-size:30px;
    margin-top:20px;
    font-weight:bold;
}

button{
    margin-top:25px;
    padding:10px 20px;
    border:none;
    border-radius:5px;
    background:white;
    color:#333;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#ddd;
}
</style>
</head>

<body>

<div class="container">
    <h1>Portfolio Website</h1>
    <p>🚀 Coming Soon</p>
    <p>I am working on something awesome. Stay tuned!</p>

    <div id="countdown"></div>

    <button onclick="alert('Thanks for your interest!')">
        Notify Me
    </button>
</div>

<script>
// countdown timer (10 days example)
var launchDate = new Date().getTime() + (10*24*60*60*1000);

var timer = setInterval(function(){

    var now = new Date().getTime();
    var distance = launchDate - now;

    var days = Math.floor(distance / (1000*60*60*24));
    var hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
    var minutes = Math.floor((distance % (1000*60*60)) / (1000*60));
    var seconds = Math.floor((distance % (1000*60)) / 1000);

    document.getElementById("countdown").innerHTML =
        days + "d " + hours + "h " + minutes + "m " + seconds + "s ";

    if(distance < 0){
        clearInterval(timer);
        document.getElementById("countdown").innerHTML = "Website Launched!";
    }

},1000);
</script>

</body>
</html>
